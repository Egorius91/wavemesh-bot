name: Export source once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    if: github.head_ref == 'feature/auto-route-europe'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Package source
        run: |
          tar --exclude=.git --exclude=.github/workflows/export-source-once.yml \
            -czf wavemesh-bot-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wavemesh-bot-source
          path: wavemesh-bot-source.tar.gz
          retention-days: 1
