version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:15'
      timezone: Europe/Zurich
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      python-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:45'
      timezone: Europe/Zurich
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - '*'
